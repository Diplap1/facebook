<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FB Video Downloader Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: linear-gradient(135deg, #667eea, #764ba2);
      --card: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.7);
      --accent: #ff3366;
      --accent-dark: #d81b60;
      --accent-glow: rgba(255,51,102,0.4);
      --border: rgba(255,255,255,0.15);
      --shadow: 0 8px 32px rgba(0,0,0,0.37);
      --glass: rgba(255,255,255,0.06);
    }

    body[data-theme="light"] {
      --bg: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      --card: rgba(255,255,255,0.85);
      --text: #1a1a1a;
      --text-muted: #555;
      --accent: #e1306c;
      --accent-dark: #b81f55;
      --accent-glow: rgba(225,48,108,0.25);
      --border: rgba(0,0,0,0.08);
      --glass: rgba(255,255,255,0.75);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 40px;
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .theme-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
      user-select: none;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    h1 {
      text-align: center;
      font-size: 2.8rem;
      margin: 0 0 8px;
      background: linear-gradient(90deg, var(--accent), #9f7aea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    .step {
      background: var(--glass);
      backdrop-filter: blur(12px);
      padding: 28px;
      border-radius: 20px;
      margin: 32px 0;
      border: 1px solid var(--border);
      transition: transform 0.3s;
    }

    .step:hover {
      transform: translateY(-4px);
    }

    .step h3 {
      color: var(--accent);
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.05rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 16px 0;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      transition: all 0.3s;
    }

    body[data-theme="light"] input,
    body[data-theme="light"] textarea {
      background: rgba(0,0,0,0.05);
      color: #000;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    textarea {
      min-height: 180px;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin: 24px 0;
    }

    button {
      padding: 16px 36px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
    }

    button.primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px var(--accent-glow);
    }

    button.secondary, button.copy-btn {
      background: var(--glass);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    button.secondary:hover, button.copy-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    #preview {
      max-width: 100%;
      border-radius: 16px;
      margin: 24px auto;
      display: block;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transition: transform 0.4s;
    }

    #preview:hover {
      transform: scale(1.02);
    }

    #result {
      margin-top: 40px;
      padding: 28px;
      background: var(--glass);
      border-radius: 20px;
      border: 1px solid var(--border);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin: 28px 0;
    }

    .info-item {
      background: rgba(255,255,255,0.06);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
      transition: all 0.3s;
    }

    .info-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .error {
      color: #ff6b6b;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
    }

    @media (max-width: 768px) {
      .container { padding: 24px; }
      h1 { font-size: 2.2rem; }
      .btn-group { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body data-theme="dark">

  <div class="container">
    <button class="theme-toggle" id="themeToggle" title="Toggle Theme">🌙</button>

    <h1>FB Video Downloader Pro</h1>
    <p class="subtitle">Download public & private videos (HD where available) • Reels • Group videos</p>

    <div class="step">
      <h3>1. Enter Facebook Video URL</h3>
      <input type="text" id="fbUrl" placeholder="https://www.facebook.com/watch/?v=123456789 or https://www.facebook.com/groups/.../videos/..." />
      <div class="btn-group">
        <button class="primary" id="generateLinkBtn">Generate Source Link</button>
      </div>
      <div id="generatedLink" style="margin-top:20px; word-break:break-all; font-size:0.95rem; line-height:1.5;"></div>
      <div id="firstTimeReminder" style="display:none; margin-top:16px; padding:16px; background:rgba(255,255,255,0.1); border-radius:12px;">
        <strong>First time only:</strong><br>
        After page loads → press <strong>Ctrl+A</strong> (or Cmd+A) → <strong>Ctrl+C</strong> to copy ALL source code.<br>
        Come back here and paste it in step 2.
      </div>
    </div>

    <div class="step">
      <h3>2. Paste Full Page Source</h3>
      <textarea id="sourcePaste" placeholder="Paste the entire page source code here... (right-click → View Page Source → select all → copy)"></textarea>
      <div class="btn-group">
        <button class="primary" id="processBtn">Process & Download</button>
      </div>
    </div>

    <div id="result"></div>
  </div>

  <script>
    // Theme toggle
    const toggleBtn = document.getElementById('themeToggle');
    function applyTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      toggleBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    toggleBtn.addEventListener('click', () => {
      const current = document.body.getAttribute('data-theme') || 'dark';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });
    applyTheme(localStorage.getItem('theme') || 'dark');

    let reminderShown = false;

    document.getElementById('generateLinkBtn').addEventListener('click', () => {
      const url = document.getElementById('fbUrl').value.trim();
      const linkEl = document.getElementById('generatedLink');
      if (!url) return alert('Please enter a Facebook video URL');

      // For private/group videos user must be logged in → we suggest view-source:
      const sourceUrl = `view-source:${url}`;

      linkEl.innerHTML = `
        <strong>Step: Open this in new tab (you must be logged in to Facebook!)</strong><br>
        <a href="${url}" target="_blank" style="color:var(--accent); text-decoration:underline; word-break:break-all;">
          ${url}
        </a>
        <br><small>→ Once video plays → right-click page → "View Page Source" (or Ctrl+U) → Ctrl+A → Ctrl+C → paste below</small>
      `;

      if (!reminderShown) {
        document.getElementById('firstTimeReminder').style.display = 'block';
        reminderShown = true;
      }
    });

    document.getElementById('processBtn').addEventListener('click', () => {
      const text = document.getElementById('sourcePaste').value.trim();
      const result = document.getElementById('result');
      result.innerHTML = '';

      if (text.length < 300) {
        result.innerHTML = '<p class="error">Source code too short. Make sure you copied the FULL page source.</p>';
        return;
      }

      try {
        // Common patterns in FB video page source (2025-2026 still often present when logged in)
        const hdMatch   = text.match(/"hd_src(?:_no_ratelimit)?":"(.*?)"/);
        const sdMatch   = text.match(/"sd_src(?:_no_ratelimit)?":"(.*?)"/);
        const thumbMatch = text.match(/"preview_url":"(.*?)"/) || text.match(/"largeImage":"(.*?)"/) || text.match(/"thumbnailSrc":"(.*?)"/);
        const titleMatch = text.match(/"title":"(.*?)"/) || text.match(/<title>(.*?)<\/title>/);

        let videoUrl = hdMatch?.[1] || sdMatch?.[1];
        const thumb   = thumbMatch?.[1]?.replace(/\\u00253a/g, ':').replace(/\\u00252f/g, '/').replace(/\\/g, '');
        const title   = (titleMatch?.[1] || 'Facebook Video').replace(/\\u[\dA-F]{4}/g, c => String.fromCharCode(parseInt(c.slice(2),16)));

        if (!videoUrl) {
          // Fallback: look for progressive download URLs or other formats
          const progMatch = text.match(/" progressive":\s*\[(.*?)\]/s);
          if (progMatch) {
            const sources = progMatch[1];
            const hdProg = sources.match(/"uri":"(.*?)".*?"height":(1080|1440|2160)/);
            if (hdProg) videoUrl = hdProg[1];
            else {
              const sdProg = sources.match(/"uri":"(.*?)"/);
              if (sdProg) videoUrl = sdProg[1];
            }
          }
        }

        videoUrl = videoUrl?.replace(/\\u00253a/g, ':').replace(/\\u00252f/g, '/').replace(/\\/g, '');

        if (!videoUrl) throw new Error("Could not find video URL in source. Make sure you're logged in and the video is playable.");

        // Build result UI
        const infoGrid = document.createElement('div');
        infoGrid.className = 'info-grid';
        infoGrid.innerHTML = `
          <div class="info-item"><strong>Quality</strong><br>${hdMatch ? 'HD' : 'SD'}</div>
          <div class="info-item"><strong>Title</strong><br>${title.substring(0,60)}${title.length>60?'...':''}</div>
        `;
        result.appendChild(infoGrid);

        if (thumb) {
          const previewDiv = document.createElement('div');
          previewDiv.style.textAlign = 'center';
          previewDiv.style.margin = '32px 0';
          previewDiv.innerHTML = `<img id="preview" src="${thumb}" alt="Preview">`;
          const thumbBtn = document.createElement('button');
          thumbBtn.className = 'secondary';
          thumbBtn.textContent = 'Download Thumbnail';
          thumbBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = thumb; a.download = 'fb_thumb.jpg'; a.click();
          };
          previewDiv.appendChild(thumbBtn);
          result.appendChild(previewDiv);
        }

        const btnGroup = document.createElement('div');
        btnGroup.className = 'btn-group';
        btnGroup.style.marginTop = '32px';

        const dlBtn = document.createElement('button');
        dlBtn.className = 'primary';
        dlBtn.textContent = 'Download Video';
        dlBtn.onclick = () => {
          const a = document.createElement('a');
          a.href = videoUrl;
          a.download = `fb_video_${Date.now()}.mp4`;
          document.body.appendChild(a);
          a.click();
          a.remove();
        };
        btnGroup.appendChild(dlBtn);

        const copyUrlBtn = document.createElement('button');
        copyUrlBtn.className = 'copy-btn';
        copyUrlBtn.textContent = 'Copy Video URL';
        copyUrlBtn.onclick = async () => {
          try {
            await navigator.clipboard.writeText(videoUrl);
            alert('Video URL copied!');
          } catch {
            alert('Copy failed — select manually');
          }
        };
        btnGroup.appendChild(copyUrlBtn);

        result.appendChild(btnGroup);

      } catch (err) {
        result.innerHTML = `<p class="error">Error: ${err.message}<br><br>Tip: You must be logged in to Facebook and the video must load/play in the tab.</p>`;
      }
    });
  </script>
</body>
</html>
